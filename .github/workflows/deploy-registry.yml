name: Deploy Registry + UI

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: cafe-registry

      - name: Clone cafe-saas
        run: |
          git clone https://x-access-token:${{ secrets.GH_PAT }}@github.com/dypras666/cafe-saas.git cafe-saas

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build UI
        working-directory: cafe-saas
        run: |
          npm ci
          npm run build

      - name: SCP public/ to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          source: cafe-saas/public/index.html,cafe-saas/public/assets/,cafe-saas/public/favicon.svg,cafe-saas/public/robots.txt,cafe-saas/public/sitemap.xml
          target: /opt/cafe-registry/public/
          strip_components: 2
          timeout: 30s

      - name: Deploy backend
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: bash /opt/cafe-registry/deploy-registry.sh
          timeout: 60s
