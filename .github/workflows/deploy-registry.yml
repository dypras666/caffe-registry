name: Deploy Registry + UI

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: cafe-registry

      - name: Clone cafe-saas
        run: |
          git clone https://x-access-token:${{ secrets.GH_PAT }}@github.com/dypras666/cafe-saas.git cafe-saas

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build UI
        working-directory: cafe-saas
        run: |
          npm ci
          npm run build

      - name: SCP public/ to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          source: cafe-saas/public/index.html,cafe-saas/public/assets/,cafe-saas/public/favicon.svg,cafe-saas/public/robots.txt,cafe-saas/public/sitemap.xml
          target: /opt/caffe-registry/public/
          strip_components: 2
          timeout: 30s

      - name: Deploy backend
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /opt/caffe-registry
            git fetch origin main
            git reset --hard origin/main
            npm install --production
            chmod +x deploy-registry.sh 2>/dev/null || true
            pkill -f "node server.js" 2>/dev/null || true
            sleep 1
            setsid node server.js >> /var/log/cafe-registry.log 2>&1 &
            PID=$!
            sleep 2
            if kill -0 $PID 2>/dev/null; then
              echo "Deploy OK — PID $PID"
            else
              echo "FAIL"
              exit 1
            fi
          timeout: 120s
