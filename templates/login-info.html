<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"></head>
<body style="margin:0;padding:0;background:#000;font-family:Futura,'Trebuchet MS','Century Gothic',sans-serif">
<table width="100%" cellpadding="0" cellspacing="0"><tr><td style="padding:0">
<table width="600" cellpadding="0" cellspacing="0" style="margin:0 auto;background:#fff">
<tr><td style="height:8px;background:#DA291C" colspan="3"></td></tr>
<tr><td width="8" style="background:#000"></td>
<td style="padding:40px 36px 20px">
<div style="font-size:11px;letter-spacing:4px;text-transform:uppercase;color:#DA291C;margin-bottom:4px">Cafe Azzura</div>
<h1 style="font-size:32px;font-weight:700;color:#000;margin:0 0 20px;text-transform:uppercase;letter-spacing:-1px">Informasi Login</h1>
<p style="font-size:15px;color:#333;line-height:1.5;margin:0 0 4px">Halo <strong style="color:#000">{{name}}</strong>,</p>
<p style="font-size:15px;color:#333;line-height:1.5;margin:0">Akun kamu untuk <strong style="color:#DA291C">{{cafeName}}</strong> sudah siap.</p>
</td>
<td width="8" style="background:#000"></td></tr>
<tr><td width="8" style="background:#000"></td>
<td style="padding:0 36px">
<div style="border:2px solid #000;padding:20px 24px;margin-bottom:24px">
<table width="100%" cellpadding="0" cellspacing="0">
<tr><td style="font-size:11px;letter-spacing:3px;text-transform:uppercase;color:#666;padding-bottom:8px;border-bottom:2px solid #DA291C" colspan="2">Account Access</td></tr>
<tr><td style="font-size:13px;color:#666;padding:12px 0 4px;width:100px;text-transform:uppercase;letter-spacing:1px">Login</td>
<td style="font-size:14px;color:#000;font-weight:700;padding:12px 0 4px"><a href="{{adminUrl}}" style="color:#DA291C;text-decoration:none">{{adminUrl}}</a></td></tr>
<tr><td style="font-size:13px;color:#666;padding:4px 0;text-transform:uppercase;letter-spacing:1px">Email</td>
<td style="font-size:14px;color:#000;font-weight:700;padding:4px 0">{{email}}</td></tr>
<tr><td style="font-size:13px;color:#666;padding:4px 0;text-transform:uppercase;letter-spacing:1px">Role</td>
<td style="font-size:14px;color:#DA291C;font-weight:700;padding:4px 0;text-transform:uppercase;letter-spacing:1px">{{role}}</td></tr>
<tr><td style="font-size:13px;color:#666;padding:4px 0;text-transform:uppercase;letter-spacing:1px">Password</td>
<td style="font-size:14px;color:#000;font-weight:700;padding:4px 0;font-family:monospace;letter-spacing:2px">{{password}}</td></tr>
</table>
</div>
<div style="text-align:center;margin:28px 0">
<a href="{{adminUrl}}" style="display:inline-block;background:#DA291C;color:#fff;padding:16px 48px;font-size:14px;font-weight:700;text-transform:uppercase;letter-spacing:2px;text-decoration:none">Login</a>
</div>
<p style="font-size:12px;color:#999;line-height:1.4;margin:20px 0 0;text-transform:uppercase;letter-spacing:1px">Jangan bagikan password ini ke siapapun.</p>
</td>
<td width="8" style="background:#000"></td></tr>
<tr><td width="8" style="background:#000"></td>
<td style="padding:24px 36px 32px;border-top:2px solid #000">
<p style="font-size:10px;letter-spacing:2px;text-transform:uppercase;color:#999;margin:0">Cafe Azzura &mdash; 2026</p>
</td>
<td width="8" style="background:#000"></td></tr>
<tr><td style="height:8px;background:#FFB81C" colspan="3"></td></tr>
</table>
</td></tr></table>
</body>
</html>
